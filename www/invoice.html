<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFFFFF">
<title>Documento — Emiti</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1A7A4A;--gm:#2A9D5C;--gl:#E8F5EE;--gxl:#F0FAF4;
  --ink:#111915;--ink2:#374840;--mu:#7A8C82;--bd:#E2EAE5;--bd2:#EDF2EF;
  --red:#C0392B;--rl:#FDECEA;--am:#B7791F;--al:#FEF3CD;--blue:#1D4ED8;--bl:#EEF2FF;
  --r:14px;--rs:9px;
  --sh:0 1px 2px rgba(17,25,21,.05),0 2px 8px rgba(17,25,21,.04);
  --shm:0 4px 20px rgba(17,25,21,.09)
}
html,body{min-height:100%;background:#F6F8F6;color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* ── LOADING / ERROR ── */
#loading,#error-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;gap:1rem}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-box{display:none}
.err-icon{width:52px;height:52px;border-radius:50%;background:var(--rl);display:flex;align-items:center;justify-content:center}
.err-icon svg{width:24px;height:24px;color:var(--red)}
.err-title{font-size:1.1rem;font-weight:700;color:var(--ink)}
.err-sub{font-size:.85rem;color:var(--mu);max-width:280px}
.err-link{font-size:.82rem;color:var(--green);text-decoration:none;font-weight:600;margin-top:.5rem}

/* ── WRAPPER ── */
#doc-wrap{display:none;padding:1.5rem 1rem 3rem;max-width:640px;margin:0 auto}

/* ── HEADER BADGE ── */
.pub-badge{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.pub-brand{display:flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:700;color:var(--mu)}
.pub-brand svg{width:18px;height:18px;color:var(--green)}
.pub-type-badge{font-size:.72rem;font-weight:700;padding:.28rem .7rem;border-radius:99px;letter-spacing:.03em;text-transform:uppercase}
.pub-type-badge.invoice{background:var(--gl);color:var(--green)}
.pub-type-badge.estimate{background:var(--bl);color:var(--blue)}

/* ── DOCUMENT CARD ── */
.doc-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--shm)}

/* ── HEADER ── */
.dh{padding:1.4rem 1.4rem 1.2rem;border-bottom:1px solid var(--bd2);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.dh-left{display:flex;flex-direction:column;gap:.25rem}
.dlogo{max-height:48px;max-width:120px;object-fit:contain;display:block;margin-bottom:.35rem}
.dbiz{font-size:1rem;font-weight:700;color:var(--ink)}
.dinfo{font-size:.75rem;color:var(--mu);line-height:1.5}
.dh-right{text-align:right;display:flex;flex-direction:column;gap:.2rem}
.dword{font-size:1.15rem;font-weight:800;color:var(--green);letter-spacing:-.02em}
.dnum{font-size:.82rem;font-weight:700;color:var(--ink2)}
.ddate{font-size:.75rem;color:var(--mu)}
.dtype-tag{display:inline-block;font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:99px;letter-spacing:.03em;text-transform:uppercase;margin-top:.1rem}
.dtype-tag.invoice{background:var(--gl);color:var(--green)}
.dtype-tag.estimate{background:var(--bl);color:var(--blue)}

/* ── CLIENT ── */
.dcl{padding:1rem 1.4rem;border-bottom:1px solid var(--bd2);background:var(--gxl)}
.dcl .lbl{font-size:.68rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.dcl .nm{font-size:.95rem;font-weight:700;color:var(--ink)}
.dcl .inf{font-size:.75rem;color:var(--mu);line-height:1.6;margin-top:.2rem}

/* ── TABLE ── */
.dt-wrap{padding:1rem 1.4rem;border-bottom:1px solid var(--bd2);overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;font-size:.82rem}
table.dt th{text-align:left;font-size:.65rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;padding:.4rem .5rem .4rem 0;border-bottom:1px solid var(--bd)}
table.dt th:not(:first-child){text-align:right}
table.dt td{padding:.55rem .5rem .55rem 0;border-bottom:1px solid var(--bd2);vertical-align:top;color:var(--ink)}
table.dt td:not(:first-child){text-align:right;white-space:nowrap;color:var(--ink2)}
table.dt tr:last-child td{border-bottom:none}
.dmk{font-size:.66rem;color:var(--mu);font-weight:400;margin-top:.15rem}

/* ── TOTALS ── */
.dtots{padding:.8rem 1.4rem 1rem;border-bottom:1px solid var(--bd2)}
.drow{display:flex;justify-content:space-between;font-size:.82rem;color:var(--ink2);padding:.18rem 0}
.dgrand{display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:var(--ink);padding:.5rem 0 .2rem;border-top:2px solid var(--ink);margin-top:.4rem}

/* ── NOTES ── */
.dnotes{padding:.8rem 1.4rem;border-bottom:1px solid var(--bd2);font-size:.82rem;color:var(--ink2);line-height:1.6;background:#FAFCFB}

/* ── PHOTOS ── */
.dphoto-line{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.dphoto-thumb{width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid var(--bd2);display:block}
.dphotos{padding:1rem 1.4rem;border-bottom:1px solid var(--bd2)}
.dphotos-lbl{font-size:.65rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}
.dphotos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.5rem}
.dphoto{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--bd2);display:block}

/* ── PAY BUTTONS ── */
.dpay{padding:.9rem 1.4rem;border-bottom:1px solid var(--bd2);display:flex;flex-wrap:wrap;gap:.5rem}
.dpay-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;border-radius:8px;font-size:.8rem;font-weight:700;text-decoration:none;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none}
.dpay-btn.stripe{background:#635BFF;color:#fff}
.dpay-btn.stripe:disabled{background:#A09CE8;cursor:not-allowed}
.dpay-btn.paypal{background:#003087;color:#fff}

/* ── PAID BANNER ── */
.paid-banner{display:flex;align-items:center;gap:.75rem;background:#F0FAF4;border:1px solid rgba(26,122,74,.25);border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:1.2rem}
.paid-banner-icon{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.paid-banner-icon svg{width:20px;height:20px;color:#fff}
.paid-banner-title{font-size:.9rem;font-weight:700;color:var(--green)}
.paid-banner-sub{font-size:.75rem;color:var(--ink2);margin-top:.1rem}

/* ── Firma remota (solo cotizaciones) ── */
.sign-area{border-top:1px solid var(--bd2);padding:1.3rem 1.6rem 1.5rem}
.sign-title{font-size:.95rem;font-weight:700;color:var(--ink)}
.sign-sub{font-size:.78rem;color:var(--mu);margin:.25rem 0 .9rem}
.sign-area input{width:100%;border:1.5px solid var(--bd);border-radius:var(--rs);padding:.6rem .75rem;font-size:.9rem;color:var(--ink);margin-bottom:.7rem;font-family:inherit;background:#fff}
.sign-area input:focus{outline:none;border-color:var(--green)}
.sig-wrap{border:1.5px solid var(--bd);border-radius:var(--rs);overflow:hidden;position:relative;background:#fafafa}
.sig-wrap canvas{display:block;width:100%;touch-action:none}
.sig-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:.82rem;pointer-events:none}
.sign-actions{display:flex;gap:.6rem;margin-top:.8rem}
.sign-actions button{border-radius:var(--rs);font-size:.85rem;font-weight:600;padding:.65rem 1rem;cursor:pointer;font-family:inherit}
.sbtn-clear{background:#fff;border:1.5px solid var(--bd);color:var(--ink2)}
.sbtn-accept{flex:1;background:var(--green);border:1.5px solid var(--green);color:#fff}
.sbtn-accept:disabled{opacity:.55;cursor:default}
.sign-err{font-size:.78rem;color:var(--red);margin-top:.6rem;display:none}
.signed-banner{display:flex;align-items:center;gap:.7rem;background:var(--gxl);border-top:1px solid var(--bd2);padding:1.1rem 1.6rem}
.signed-banner svg{width:22px;height:22px;color:var(--green);flex-shrink:0}
.signed-banner-title{font-size:.88rem;font-weight:700;color:var(--green)}
.signed-banner-sub{font-size:.74rem;color:var(--ink2);margin-top:.1rem}

/* ── FOOTER ── */
.dfooter{padding:.9rem 1.4rem;text-align:center;font-size:.72rem;color:var(--mu);line-height:1.8}

/* ── INVOICE TEMPLATES (Pro) ── classic = base styles above ── */
/* Accent driven by --accent / --accent-tint (set inline on .doc-card from the
   shared payload's biz.templateColor). Fallbacks = each template's default. */
/* Moderno */
.tpl-modern .dh{background:var(--accent,#1A7A4A);border-bottom:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.tpl-modern .dbiz,.tpl-modern .dword,.tpl-modern .dnum{color:#fff}
.tpl-modern .dinfo,.tpl-modern .ddate{color:rgba(255,255,255,.85)}
.tpl-modern table.dt th{color:var(--accent,#1A7A4A);border-bottom-color:var(--accent,#1A7A4A)}
.tpl-modern .dgrand{background:var(--accent-tint,#E8F5EE);border-top:none;border-radius:10px;padding:.5rem .8rem;color:var(--accent,#1A7A4A);-webkit-print-color-adjust:exact;print-color-adjust:exact}
/* Bold — charcoal header fixed, accent = amber slot */
.tpl-bold .dh{background:#111915;border-bottom:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.tpl-bold .dbiz{color:#fff;font-size:1.1rem}
.tpl-bold .dinfo,.tpl-bold .dnum,.tpl-bold .ddate{color:rgba(255,255,255,.8)}
.tpl-bold .dword{color:var(--accent,#C8821A);font-size:1.35rem;font-weight:800;text-transform:uppercase}
.tpl-bold table.dt th{color:#111915;border-bottom:2px solid #111915}
.tpl-bold .dgrand{border-top:3px solid #111915;color:#111915}
.tpl-bold .dgrand span:last-child{color:var(--accent,#C8821A)}
/* Minimal — accent only on the grand total */
.tpl-minimal .dh{border-bottom:1px solid #ECECEC}
.tpl-minimal .dbiz{font-weight:500}
.tpl-minimal .dword{color:#1A1A1A;font-weight:500;letter-spacing:.05em;text-transform:uppercase;font-size:1rem}
.tpl-minimal .dcl{background:#FAFAFA}
.tpl-minimal .dcl .lbl{letter-spacing:.12em}
.tpl-minimal table.dt th{color:#9AA39E;letter-spacing:.1em;font-weight:500}
.tpl-minimal .dgrand{border-top:1px solid var(--accent,#1A1A1A);color:var(--accent,#1A1A1A);font-weight:600}
.tpl-minimal .dnotes{background:#FAFAFA;color:#9AA39E}
/* Elegante — accent = navy slot, gold stays fixed */
.tpl-elegant .dbiz,.tpl-elegant .dword{font-family:Georgia,'Times New Roman',serif}
.tpl-elegant .dh{border-bottom:2px solid #B08D57}
.tpl-elegant .dbiz{color:var(--accent,#1E3A5F);font-size:1.15rem}
.tpl-elegant .dword{color:var(--accent,#1E3A5F);font-weight:700}
.tpl-elegant .dcl{background:#F7F9FB}
.tpl-elegant .dcl .nm{color:var(--accent,#1E3A5F)}
.tpl-elegant table.dt th{color:var(--accent,#1E3A5F)}
.tpl-elegant .dgrand{border-top:2px solid var(--accent,#1E3A5F);color:var(--accent,#1E3A5F)}
.tpl-elegant .dgrand span:last-child{color:#B08D57}
.tpl-elegant .dfooter{color:#B08D57}

/* ── STATUS ── */
.dstatus{padding:.65rem 1.4rem;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:600}
.dstatus.paid{background:#F0FAF4;color:var(--green)}
.dstatus.pending{background:var(--al);color:var(--am)}
.dstatus svg{width:14px;height:14px}

@media print{
  body{background:#fff}
  #doc-wrap{padding:0;max-width:100%}
  .pub-badge{display:none}
  .doc-card{box-shadow:none;border:none}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div style="font-size:.85rem;color:var(--mu)">Cargando documento…</div>
</div>

<div id="error-box">
  <div class="err-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <div class="err-title">Documento no encontrado</div>
  <div class="err-sub">Este enlace puede haber expirado o el documento no existe.</div>
  <a href="https://emiti-app.vercel.app" class="err-link">← Ir a Emiti</a>
</div>

<div id="doc-wrap"></div>

<script>
const SUPA_URL = 'https://gtxxokmrkesyljqodtrr.supabase.co';
const SUPA_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0eHhva21ya2VzeWxqcW9kdHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDU5MDQsImV4cCI6MjA5MDQ4MTkwNH0.eRdyJuN62yNv7ym7sM466kplsJuQs3-D_2u12Kb9amA';

let CURRENT_INVOICE_ID = null;
let CURRENT_INVOICE = null;
let VIEWED_AT = null; // cuándo este visor cargó el doc; viaja como evidencia en la firma

function fd(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-box').style.display = 'flex';
}

// URL pública de una foto a partir de su path almacenado (bucket public-read).
// Mismo derivado que en el editor; el JSON guarda el path, no la URL completa.
function photoUrl(path) {
  return `${SUPA_URL}/storage/v1/object/public/document-photos/${path}`;
}

function renderDoc(inv, biz, logo, payments) {
  const isEst = inv.type === 'estimate';
  const label = isEst ? 'Cotización' : 'Factura';

  // El estado persistente sale SOLO de inv.status (lo escribe el webhook en
  // la BD). ?paid=1 llega en el redirect de éxito de Stripe y únicamente
  // activa el banner de confirmación inmediata: cualquiera puede añadirlo a
  // mano al link, así que nunca debe pintar la factura como "Pagada".
  const isPaid = inv.status === 'paid';
  const justPaid = new URLSearchParams(window.location.search).get('paid') === '1';

  let payHtml = '';
  if (!isPaid && !justPaid) {
    // El botón de tarjeta ya NO sale del snapshot payments.stripe (link manual
    // legado, muerto en C2): se inyecta async según el estado real de la
    // cuenta conectada del dueño (addCardButtonIfAvailable). PayPal.me sigue
    // siendo el método básico del snapshot.
    const btns = [];
    if (payments && payments.paypal) btns.push(`<a class="dpay-btn paypal" href="https://paypal.me/${payments.paypal}" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11l5 5 5-5M7 6l5 5 5-5"/></svg>PayPal</a>`);
    payHtml = `<div class="dpay" id="dpay"${btns.length ? '' : ' style="display:none"'}>${btns.join('')}</div>`;
  }

  // justPaid sin status confirmado: sin label (el banner ya comunica) — un
  // "Pendiente de pago" junto a "Pago recibido" mientras el webhook procesa
  // sería contradictorio, y afirmar "Pagada" sin la BD sería falsificable.
  const statusLabel = isPaid
    ? `<div class="dstatus paid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Pagada</div>`
    : justPaid ? ''
    : `<div class="dstatus pending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Pendiente de pago</div>`;

  const infoItems = [
    biz.owner ? esc(biz.owner) : null,
    biz.phone ? esc(biz.phone) : null,
    biz.town  ? esc(biz.town) + ', PR' : null
  ].filter(Boolean);

  const clientItems = [
    inv.phone ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${esc(inv.phone)}` : '',
    inv.email ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>${esc(inv.email)}` : '',
    inv.addr ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(inv.addr)}` : ''
  ].filter(Boolean);

  const rows = inv.lines.map(l => {
    const mk = parseFloat(l.markup) || 0;
    const cost = parseFloat(l.price) || 0;
    const unit = cost * (1 + mk/100);
    const showBreak = inv.showMarkup && mk > 0;
    // Fotos de la línea bajo su descripción. onerror: oculta el thumb si el
    // archivo fue borrado o su referencia quedó colgando (borrado diferido).
    const linePhotos = (Array.isArray(l.photos) && l.photos.length)
      ? `<div class="dphoto-line">${l.photos.map(p =>
          `<a href="${esc(photoUrl(p.path))}" target="_blank" rel="noopener"><img src="${esc(photoUrl(p.path))}" class="dphoto-thumb" loading="lazy" alt="" onerror="this.parentNode.style.display='none'"></a>`
        ).join('')}</div>`
      : '';
    return `
    <tr>
      <td>${esc(l.desc)}${showBreak ? `<div class="dmk">Costo $${cost.toFixed(2)} · Margen ${mk}%</div>` : ''}${linePhotos}</td>
      <td>${esc(String(l.qty))}</td>
      <td>$${unit.toFixed(2)}</td>
      <td>$${(parseFloat(l.qty) * unit).toFixed(2)}</td>
    </tr>`;
  }).join('');

  const tpl = ['classic','modern','bold','minimal','elegant'].includes(biz.template) ? biz.template : 'classic';

  // Accent color chosen by the business (rides along inside biz.templateColor).
  // tint = precomputed light wash for Moderno's grand-total bg (no color-mix,
  // so iOS 15.x WebViews render it). Mirrors TPL_COLORS in index.html.
  const TPL_TINTS = {
    '#1A7A4A':'#E8F5EE','#047857':'#E1EFEB','#0F766E':'#E2EFEE','#0E7490':'#E2EEF2',
    '#1D4ED8':'#E4EAFA','#4338CA':'#E8E7F9','#1E3A5F':'#E4E7EC','#7C3AED':'#EFE7FD',
    '#9D174D':'#F3E3EA','#BE123C':'#F7E3E8','#C0392B':'#F7E7E6','#C2410C':'#F8E8E2',
    '#B45309':'#F6EAE2','#334155':'#E7E8EB'
  };
  const accentHex = (tpl !== 'classic' && biz.templateColor && TPL_TINTS[biz.templateColor]) ? biz.templateColor : null;
  const accentStyle = accentHex ? ` style="--accent:${accentHex};--accent-tint:${TPL_TINTS[accentHex]}"` : '';

  // Galería de fotos generales del documento (al final). Mismo onerror defensivo.
  const docPhotos = Array.isArray(inv.photos) ? inv.photos : [];
  const photosHtml = docPhotos.length
    ? `<div class="dphotos">
         <div class="dphotos-lbl">Fotos</div>
         <div class="dphotos-grid">${docPhotos.map(p =>
           `<a href="${esc(photoUrl(p.path))}" target="_blank" rel="noopener"><img src="${esc(photoUrl(p.path))}" class="dphoto" loading="lazy" alt="" onerror="this.parentNode.style.display='none'"></a>`
         ).join('')}</div>
       </div>`
    : '';

  const wrap = document.getElementById('doc-wrap');
  wrap.innerHTML = `
    <div class="pub-badge">
      <div class="pub-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        Emiti
      </div>
      <span class="pub-type-badge ${isEst ? 'estimate' : 'invoice'}">${label}</span>
    </div>

    ${justPaid ? `
    <div class="paid-banner">
      <div class="paid-banner-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div>
        <div class="paid-banner-title">Pago recibido — ¡Gracias!</div>
        <div class="paid-banner-sub">Tu pago fue procesado exitosamente. El negocio ha sido notificado.</div>
      </div>
    </div>` : ''}

    <div class="doc-card tpl-${tpl}"${accentStyle}>
      <div class="dh">
        <div class="dh-left">
          ${logo && logo.startsWith('data:') ? `<img src="${logo}" class="dlogo" alt="Logo">` : ''}
          <div class="dbiz">${esc(biz.biz)}</div>
          ${infoItems.length ? `<div class="dinfo">${infoItems.join('<br>')}</div>` : ''}
        </div>
        <div class="dh-right">
          <span class="dword">${label}</span>
          <span class="dnum">${esc(inv.num)}</span>
          <span class="ddate">${fd(inv.date)}</span>
          ${isEst && inv.validUntil ? `<span class="ddate">Válida hasta: ${fd(inv.validUntil)}</span>` : ''}
          <span class="dtype-tag ${isEst ? 'estimate' : 'invoice'}">${label}</span>
        </div>
      </div>

      <div class="dcl">
        <div class="lbl">${isEst ? 'Cotización para' : 'Facturado a'}</div>
        <div class="nm">${esc(inv.client)}</div>
        ${clientItems.length ? `<div class="inf">${clientItems.join('<br>')}</div>` : ''}
      </div>

      ${statusLabel}

      <div class="dt-wrap">
        <table class="dt">
          <thead>
            <tr>
              <th>Descripción</th>
              <th style="text-align:right">Cant</th>
              <th style="text-align:right">Precio</th>
              <th style="text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      <div class="dtots">
        <div class="drow"><span>Subtotal</span><span>$${parseFloat(inv.sub||0).toFixed(2)}</span></div>
        ${(inv.dsc||0) > 0 ? `<div class="drow"><span>Descuento</span><span>- $${parseFloat(inv.dsc).toFixed(2)}</span></div>` : ''}
        ${(inv.ivu||0) > 0 ? `<div class="drow"><span>Impuestos (${inv.ivu}%)</span><span>$${parseFloat(inv.tax||0).toFixed(2)}</span></div>` : ''}
        <div class="dgrand"><span>Total</span><span>$${parseFloat(inv.total||0).toFixed(2)}</span></div>
        <!-- Cargo por procesamiento: lo rellena addCardButtonIfAvailable() SOLO si el
             negocio activó pass_processing_fee y hay un cargo estimado > 0 (mismo
             criterio que el aviso pre-checkout). data-total = total de la factura (T). -->
        <div id="feeRows" data-total="${parseFloat(inv.total||0)}"></div>
      </div>

      ${inv.notes ? `<div class="dnotes">${esc(inv.notes)}</div>` : ''}
      ${payHtml}
      ${isEst ? '<div id="sign-slot"></div>' : ''}
      ${photosHtml}

      <div class="dfooter">
        Gracias por su preferencia.${biz.phone ? `<br>${esc(biz.phone)}` : ''}
        <br><span style="font-size:.65rem">Generado con <a href="https://emiti-app.vercel.app" style="color:var(--green);text-decoration:none;font-weight:700">Emiti</a></span>
      </div>
    </div>
  `;

  document.title = `${label} ${inv.num} — ${biz.biz || 'Emiti'}`;
  document.getElementById('loading').style.display = 'none';
  wrap.style.display = 'block';

  if (!isPaid && !justPaid) addCardButtonIfAvailable();
  if (isEst) addSignAreaIfEligible(inv);
}

// Muestra "Pagar con tarjeta" solo si el dueño tiene su cuenta de Stripe
// conectada y activa (lo resuelve el server con service_role; el perfil de
// otro usuario no es legible desde el rol anon del visor).
async function addCardButtonIfAvailable() {
  try {
    const res = await fetch('/api/pay-invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invoiceId: CURRENT_INVOICE_ID, action: 'methods' })
    });
    if (!res.ok) {
      console.warn('[invoice] methods HTTP', res.status);
      return;
    }
    const { card, passThrough, feeEstimate, deposit } = await res.json();
    const dpay = document.getElementById('dpay');
    if (!dpay) return;
    // Aviso informativo del depósito SOLICITADO (aún pendiente): se muestra SIEMPRE
    // que el negocio lo configuró, CON O SIN Stripe — el negocio puede cobrarlo por
    // otro medio (efectivo/transferencia). Va como bloque propio sobre el área de
    // pago; el botón "Pagar depósito" de abajo queda condicionado a Stripe (card).
    const totalC = deposit ? deposit.paidCents + deposit.balanceCents : 0;
    const depPending = !!(deposit && deposit.configured && deposit.nextKind === 'deposit' && deposit.nextCents > 0);
    if (depPending) {
      dpay.insertAdjacentHTML('beforebegin', `<div style="margin:0 1.4rem .8rem;padding:.7rem 1rem;background:#fef9c3;border:1px solid #fde68a;border-radius:10px;font-size:.82rem;color:#7c5e00;line-height:1.45">Se requiere un depósito de <strong>$${(deposit.nextCents/100).toFixed(2)}</strong> para iniciar. Balance después: $${((totalC-deposit.nextCents)/100).toFixed(2)}.</div>`);
    }
    // Botón de pago con tarjeta: solo si el dueño tiene Stripe conectado.
    if (!card) return;
    // Próximo pago (siempre server-side): depósito, balance, o pago completo.
    // Sin depósito configurado -> 'full' (comportamiento previo).
    let kind = 'full', payLabel = 'Pagar con tarjeta', depInfo = '';
    if (deposit && deposit.configured) {
      if (deposit.nextKind === 'deposit' && deposit.nextCents > 0) {
        kind = 'deposit';
        payLabel = `Pagar depósito $${(deposit.nextCents/100).toFixed(2)}`;
        // La info del depósito ya la muestra el aviso de arriba; no duplicar aquí.
      } else if (deposit.balanceCents > 0) {
        kind = 'balance';
        payLabel = `Pagar balance $${(deposit.balanceCents/100).toFixed(2)}`;
        depInfo = `<div style="font-size:12px;color:#6b7280;margin-top:6px;line-height:1.4">Depósito pagado: $${(deposit.paidCents/100).toFixed(2)} · Balance pendiente: $${(deposit.balanceCents/100).toFixed(2)}</div>`;
      }
    }
    // Aviso de transparencia del cargo por procesamiento (pass-through).
    const feeNote = (passThrough && feeEstimate > 0)
      ? `<div style="font-size:12px;color:#6b7280;margin-top:6px;line-height:1.4">Pagar con tarjeta añade un cargo por procesamiento de ~$${Number(feeEstimate).toFixed(2)}.</div>`
      : '';
    dpay.insertAdjacentHTML('afterbegin', `<button class="dpay-btn stripe" id="stripe-pay-btn" onclick="startStripeCheckout('${kind}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>${payLabel}</button>${depInfo}${feeNote}`);
    dpay.style.display = '';
    // Desglose "Total con tarjeta" en los totales SOLO para pago completo (kind
    // 'full'). En depósito/balance el monto va en el botón y el Checkout de Stripe
    // ya muestra el desglose de sus dos line items.
    const feeRows = document.getElementById('feeRows');
    if (kind === 'full' && passThrough && feeEstimate > 0 && feeRows) {
      const t = parseFloat(feeRows.dataset.total || '0');
      const grand = t + Number(feeEstimate);
      feeRows.innerHTML =
        `<div class="drow"><span>Cargo por procesamiento (tarjeta)</span><span>$${Number(feeEstimate).toFixed(2)}</span></div>`
      + `<div class="dgrand"><span>Total con tarjeta</span><span>$${grand.toFixed(2)}</span></div>`;
    }
  } catch (e) {
    console.warn('[invoice] methods:', e.message);
  }
}

async function startStripeCheckout(kind) {
  const btn = document.getElementById('stripe-pay-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Redirigiendo…'; }
  try {
    const res = await fetch('/api/pay-invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // Solo id + tipo de pago: monto, depósito, fee y dueño se resuelven
      // server-side de la BD (el cliente nunca dicta el monto a cobrar).
      body: JSON.stringify({ invoiceId: CURRENT_INVOICE_ID, payment_kind: kind || 'full' })
    });
    const { url, error } = await res.json();
    if (error) throw new Error(error);
    window.location.href = url;
  } catch(e) {
    alert('Error al procesar pago: ' + e.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pagar con tarjeta'; }
  }
}

// ── FIRMA REMOTA (solo cotizaciones) ──
// Canvas táctil idéntico al in-app (index.html initCanvas/clearCanvas/
// canvasToData); se copia porque el visor es standalone, sin JS compartido.
const sigCanvases = {};
const isDrawing = {};

function initCanvas(id) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || canvas.parentElement.offsetWidth || 300;
  ctx.strokeStyle = '#111915'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  sigCanvases[id] = { ctx, hasDrawn: false };
  isDrawing[id] = false;

  const getPos = (e, c) => {
    const rect = c.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * (c.width / rect.width), y: (src.clientY - rect.top) * (c.height / rect.height) };
  };

  const start = e => { e.preventDefault(); isDrawing[id] = true; const p = getPos(e, canvas); ctx.beginPath(); ctx.moveTo(p.x, p.y); const ph = document.getElementById(id.replace('Canvas','Ph')||id+'Ph'); if(ph) ph.style.display='none'; };
  const draw = e => { e.preventDefault(); if (!isDrawing[id]) return; const p = getPos(e, canvas); ctx.lineTo(p.x, p.y); ctx.stroke(); sigCanvases[id].hasDrawn = true; };
  const stop = e => { e.preventDefault(); isDrawing[id] = false; };

  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', draw, {passive:false}); canvas.addEventListener('touchend', stop, {passive:false});
}

function clearCanvas(id, phId) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const sc = sigCanvases[id]; if (sc) { sc.ctx.clearRect(0, 0, canvas.width, canvas.height); sc.hasDrawn = false; }
  const ph = document.getElementById(phId); if (ph) ph.style.display = 'flex';
}

function canvasToData(id) {
  const canvas = document.getElementById(id); if (!canvas) return null;
  return sigCanvases[id]?.hasDrawn ? canvas.toDataURL('image/png') : null;
}

// La elegibilidad REAL la decide el server (gates 422/410 y el UNIQUE->409);
// esto solo evita pintar el panel cuando no corresponde: ya firmada en persona
// (inv.clientSig en el JSON), vencida (mismo criterio de fecha que el server),
// o ya firmada remotamente (GET al endpoint; NO se consulta la tabla por
// PostgREST — sin política anon, la firma no es legible con solo el link).
async function addSignAreaIfEligible(inv) {
  const slot = document.getElementById('sign-slot');
  if (!slot) return;
  if (inv.clientSig) return;
  if (inv.validUntil && new Date().toISOString().split('T')[0] > inv.validUntil) return;
  let st;
  try {
    const res = await fetch(`/api/sign-document?invoiceId=${encodeURIComponent(CURRENT_INVOICE_ID)}`, { cache: 'no-store' });
    if (!res.ok) return; // sin estado no se ofrece firmar; el server protege igual
    st = await res.json();
  } catch { return; }
  if (st.signed) { renderSignedBanner(st.signedAt); return; }
  slot.innerHTML = `
    <div class="sign-area">
      <div class="sign-title">¿Aceptas esta cotización?</div>
      <div class="sign-sub">Escribe tu nombre y firma con el dedo para aceptarla. El negocio recibirá una notificación.</div>
      <input type="text" id="signerName" placeholder="Tu nombre completo" maxlength="120" autocomplete="name">
      <div class="sig-wrap" style="height:140px"><canvas id="pubSigCanvas" height="140"></canvas><div class="sig-placeholder" id="pubSigPh">Firma aquí con el dedo</div></div>
      <div class="sign-actions">
        <button class="sbtn-clear" onclick="clearCanvas('pubSigCanvas','pubSigPh')">Limpiar</button>
        <button class="sbtn-accept" id="sign-submit" onclick="submitSignature()">Firmar y aceptar</button>
      </div>
      <div class="sign-err" id="sign-err"></div>
    </div>`;
  initCanvas('pubSigCanvas');
}

function showSignErr(msg) {
  const el = document.getElementById('sign-err');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function renderSignedBanner(signedAt) {
  const slot = document.getElementById('sign-slot');
  if (!slot) return;
  // signedAt ISO -> fecha legible con fd() (solo la parte YYYY-MM-DD)
  const when = signedAt ? ` el ${fd(String(signedAt).split('T')[0].split(' ')[0])}` : '';
  slot.innerHTML = `
    <div class="signed-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div>
        <div class="signed-banner-title">Cotización aceptada</div>
        <div class="signed-banner-sub">Este documento fue firmado${when}. El negocio ha sido notificado.</div>
      </div>
    </div>`;
}

async function submitSignature() {
  const name = (document.getElementById('signerName')?.value || '').trim();
  const png = canvasToData('pubSigCanvas');
  if (!name) { showSignErr('Escribe tu nombre completo.'); return; }
  if (!png) { showSignErr('Dibuja tu firma para continuar.'); return; }
  const err = document.getElementById('sign-err'); if (err) err.style.display = 'none';
  const btn = document.getElementById('sign-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
  try {
    const res = await fetch('/api/sign-document', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invoiceId: CURRENT_INVOICE_ID, signerName: name, signaturePng: png, viewedAt: VIEWED_AT })
    });
    const out = await res.json().catch(() => ({}));
    if (res.ok) { renderSignedBanner(out.signedAt); return; }
    // 409: otra persona firmó primero (el UNIQUE ganó) -> mostrar estado firmado
    if (res.status === 409) { renderSignedBanner(null); return; }
    showSignErr(out.error || 'No se pudo enviar la firma. Intenta de nuevo.');
  } catch {
    showSignErr('Error de conexión. Intenta de nuevo.');
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Firmar y aceptar'; }
}

async function init() {
  const parts = window.location.pathname.split('/');
  const slug = decodeURIComponent(parts[parts.length - 1]);

  console.log('[invoice] slug:', slug);

  if (!slug) { showError(); return; }

  CURRENT_INVOICE_ID = slug;

  // Safari/WebKit puede servir esta consulta GET desde su disk-cache (la respuesta de
  // Supabase no envía Cache-Control: no-store), devolviendo una respuesta vacía/obsoleta
  // y mostrando "Documento no encontrado" aunque la fila exista. Forzamos cache:'no-store'
  // en cada petición de supabase-js: el navegador no lee ni guarda esta respuesta en caché.
  // persistSession:false -> el visor público NUNCA lee la sesión de Supabase que el app
  // (mismo origen) guarda en localStorage; sin esto, createClient toma ese JWT del usuario
  // y consulta como autenticado, donde RLS es "owner read own" (no "anon read = true"),
  // devolviendo 0 filas/401 y mostrando "Documento no encontrado". Forzamos siempre anon.
  const supa = supabase.createClient(SUPA_URL, SUPA_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
    global: {
      fetch: (input, init = {}) => fetch(input, { ...init, cache: 'no-store' })
    }
  });

  // Los enlaces usan el número de documento como slug (ej. COT-0001).
  // Por compatibilidad, si parece UUID se sigue buscando por id.
  const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(slug);
  // maybeSingle() + order/limit: no rompe si quedara algún slug duplicado (devuelve el más reciente).
  let query = supa.from('invoices').select('data').order('created_at', { ascending: false }).limit(1);
  query = isUUID ? query.eq('id', slug) : query.eq('slug', slug);
  const { data, error } = await query.maybeSingle();

  console.log('[invoice] Supabase error:', error?.message || null, '| data:', !!data);

  if (error || !data || !data.data) { showError(); return; }

  let parsed;
  try { parsed = JSON.parse(data.data); } catch { showError(); return; }

  const { inv, biz, logo, payments } = parsed;
  if (!inv || !biz) { showError(); return; }

  CURRENT_INVOICE = inv;
  VIEWED_AT = new Date().toISOString();
  // Un doc malformado en la BD (campo faltante/corrupto) lanzaba dentro de
  // renderDoc y dejaba el spinner "Cargando…" infinito: la línea que lo oculta
  // vive al final del render. Fail-visible: mejor "Documento no encontrado"
  // que un colgado sin salida para el cliente.
  try {
    renderDoc(inv, biz, logo || null, payments || null);
  } catch (e) {
    console.error('[invoice] renderDoc:', e.message);
    showError();
  }
}

init();
</script>
